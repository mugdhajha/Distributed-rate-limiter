events {
    worker_connections 1024;
}

http {
    # Round-robin is nginx's default upstream balancing algorithm --
    # listing 3 servers here with no weight/method directive means
    # requests cycle 1 -> 2 -> 3 -> 1 -> 2 -> 3 ...
    upstream rate_limiter_backends {
        server app1:8000;
        server app2:8000;
        server app3:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://rate_limiter_backends;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
